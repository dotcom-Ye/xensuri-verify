<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>使用教程 — XENSURI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: -20px; left: -20px; right: -20px; bottom: -20px;
      background: url('背景.jpg') center/cover no-repeat;
      filter: blur(6px) brightness(0.45);
      z-index: -1;
    }

    /* ===== Page Wrapper ===== */
    .page {
      max-width: 400px;
      margin: 0 auto;
      padding: 20px 20px 40px;
      position: relative;
      z-index: 1;
    }

    /* ===== Back Button ===== */
    .back-row {
      margin-bottom: 20px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #9ca3af;
      text-decoration: none;
      padding: 8px 0;
      transition: color 0.2s;
    }
    .back-btn:active { color: #fff; }
    .back-btn svg {
      width: 18px; height: 18px;
    }

    /* ===== Guide Card ===== */
    .guide-card {
      margin-top: 24px;
      background: #1a1a1a;
      border: 1px solid #272727;
      border-radius: 20px;
      padding: 36px 28px 32px;
    }

    .guide-brand {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      margin-bottom: 6px;
    }
    .guide-brand .dot { color: #3b82f6; }
    .guide-brand .reg {
      font-size: 11px;
      font-weight: 400;
      vertical-align: super;
      color: #9ca3af;
      margin-left: 1px;
    }

    .guide-heading {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .guide-subheading {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 28px;
      letter-spacing: 0.3px;
    }

    /* ===== Steps ===== */
    .step-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .step-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 16px 0;
    }
    .step-item + .step-item {
      border-top: 1px solid #1f1f1f;
    }
    .step-num {
      flex-shrink: 0;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #3b82f6;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }
    .step-content {
      flex: 1;
    }
    .step-text {
      font-size: 14px;
      color: #d1d5db;
      line-height: 1.6;
    }
    .step-hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 3px;
      font-style: italic;
    }

    /* ===== Tagline ===== */
    .guide-tagline {
      display: block;
      margin-top: 28px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #3b82f6;
      text-decoration: none;
      padding: 14px 0;
      border-radius: 12px;
      letter-spacing: 0.5px;
      transition: all 0.2s;
    }
    .guide-tagline:active {
      background: #2563eb;
      transform: scale(0.98);
    }

    /* ===== Links ===== */
    .link-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-top: 20px;
    }
    .link-row a {
      font-size: 12px;
      color: #6b7280;
      text-decoration: none;
      transition: color 0.2s;
    }
    .link-row a:active { color: #fff; }

    /* ===== Video Section ===== */
    .video-section {
      margin-top: 24px;
      border-radius: 14px;
      overflow: hidden;
    }
    .video-section video {
      display: block;
      width: 100%;
      border-radius: 14px;
      background: #000;
    }

    /* ===== Trust Badge ===== */
    .trust-badge {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #525252;
    }
    .trust-badge span {
      color: #10b981;
    }

    /* ===== Footer ===== */
    .page-footer {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      color: #3f3f3f;
    }
    .page-footer span {
      color: #525252;
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Back Button -->
  <div class="back-row">
    <a class="back-btn" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      返回验证结果
    </a>
  </div>

  <!-- Video Section -->
  <div class="video-section">
    <video controls playsinline preload="metadata" poster="视频背景.jpg">
      <source src="安装视频.mp4" type="video/mp4">
      您的浏览器不支持视频播放。
    </video>
  </div>

  <!-- Guide Card -->
  <div class="guide-card">
    <div class="guide-brand">XENSURI<span class="reg">&reg;</span><span class="dot">.</span></div>
    <div class="guide-heading">如何使用 XENSURI 冷疗仪？</div>
    <div class="guide-subheading">简单五步，开启你的康复之旅</div>

    <ul class="step-list">
      <li class="step-item">
        <div class="step-num">1</div>
        <div class="step-content">
          <div class="step-text">将水泵完全浸入冰水中。</div>
          <div class="step-hint">提示：水位必须高于最低水位。</div>
        </div>
      </li>
      <li class="step-item">
        <div class="step-num">2</div>
        <div class="step-content">
          <div class="step-text">拉链完全拉上，保冷效果更持久。</div>
        </div>
      </li>
      <li class="step-item">
        <div class="step-num">3</div>
        <div class="step-content">
          <div class="step-text">在垫子和皮肤之间垫一块干布，并将绑带系紧。</div>
        </div>
      </li>
      <li class="step-item">
        <div class="step-num">4</div>
        <div class="step-content">
          <div class="step-text">接通电源，设置定时器和流量。</div>
        </div>
      </li>
      <li class="step-item">
        <div class="step-num">5</div>
        <div class="step-content">
          <div class="step-text">将冷疗垫放在冷疗仪下方，预防冷凝水流出。</div>
        </div>
      </li>
    </ul>

    <a class="guide-tagline" href="https://www.xensuri.com">Reclaim Your Recovery!</a>

    <div class="link-row">
      <a href="https://www.xensuri.com/pages/warranty-policy">保修政策</a>
      <a href="https://www.xensuri.com/pages/contact-us">联系客服</a>
    </div>
  </div>

  <div class="trust-badge">
    XENSURI 已服务 <span>10,000+</span> 康复用户
  </div>

  <div class="page-footer">
    由 <span>XenSecure</span> 提供安全验证
  </div>

</div>

</body>
</html>
